{% extends 'users/auth_base.html' %}

{% block auth_title %}メール送信完了 | カブログ{% endblock %}

{% block auth_body %}
  <div class="auth-head center">
    <div class="icon-badge ok"><i class="bi bi-envelope-check"></i></div>
    <h1 class="serif">メールを送信しました</h1>
    <p>入力されたメールアドレスに、再設定用のリンクをお送りしました。<br>届かない場合は迷惑メールフォルダもご確認ください。</p>
  </div>

  <div class="note">
    <h5><i class="bi bi-signpost-2"></i>次のステップ</h5>
    <ol>
      <li>メール内の再設定リンクを開きます。</li>
      <li>新しいパスワードを設定します。</li>
      <li>設定後、新しいパスワードでログインできます。</li>
    </ol>
  </div>

  <a href="{% url 'users:login' %}" class="btn btn-primary"><i class="bi bi-box-arrow-in-right"></i>ログインに戻る</a>
{% endblock %}
