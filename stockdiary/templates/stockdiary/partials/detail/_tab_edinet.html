{% load stockdiary_filters humanize static %}
          <div class="d-flex align-items-center justify-content-between mb-3">
            <h5 class="mb-0 fw-bold">
              <i class="bi bi-file-earmark-text text-primary me-2"></i>EDINET 開示書類
            </h5>
            <span class="badge bg-light text-dark border small">{{ diary.stock_symbol }}</span>
          </div>

          <!-- ローディングインジケーター -->
          <div id="edinet-loading" class="htmx-indicator text-center py-3">
            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
            <span class="text-muted small">開示書類を取得中...</span>
          </div>

          <!-- パネル本体（HTMXで差し込み） -->
          <div id="edinet-panel-body"></div>

          <!-- メモ化プリセット情報表示エリア -->
          <div id="edinet-prefill-toast" class="alert alert-success mt-2 py-2 small" style="display:none;">
            <i class="bi bi-check-circle me-1"></i>
            開示内容をメモに読み込みました。継続記録フォームを確認してください。
          </div>
