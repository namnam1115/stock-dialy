<button type="button"
        class="dropdown-item{% if diary.is_excluded %} text-warning{% endif %}"
        hx-post="{% url 'stockdiary:toggle_exclude' diary.id %}"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        hx-target="this"
        hx-swap="outerHTML">
  {% if diary.is_excluded %}
    <i class="bi bi-arrow-counterclockwise me-2"></i>アーカイブから戻す
  {% else %}
    <i class="bi bi-archive me-2"></i>アーカイブする（棚に戻す）
  {% endif %}
</button>
