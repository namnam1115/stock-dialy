<!doctype html><html lang="ja"><head><meta charset="utf-8">
<link rel="stylesheet" href="promo.css">
<style>
  .pad{display:flex;flex-direction:column}
  .eyebrow{align-self:flex-start;margin:26px 0 22px}
  .band{display:flex;gap:34px;align-items:center;margin-top:34px}
  .band .left{flex:1;min-width:0}
  .phone .screen{width:326px;height:566px}
  .phone{width:auto}
  .signrow{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
  .feat .ic svg{stroke:#00668c;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .h1{font-size:60px}
</style></head>
<body>
<div class="frame">
  <div class="blob a"></div><div class="blob b"></div>
  <div class="pad">
    <div class="brand">
      <img class="mark" src="../../icon-192.svg" alt="">
      <div class="name">カブログ<span class="en">KABULOG</span></div>
    </div>

    <div class="eyebrow"><span class="dot"></span>投資家の成長OS</div>

    <h1 class="h1">「いくら儲けたか」ではなく、<br><span class="hi">「なぜ、そう判断したか」。</span></h1>
    <p class="lead" style="margin-top:24px">証券口座は損益を記録する。カブログは、なぜ買い、なぜ売り、<br>その判断は正しかったか を記録する投資ノート。</p>

    <div class="band">
      <div class="left feat">
        <div class="row">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M4 12a8 8 0 0 1 13.7-5.6M20 12a8 8 0 0 1-13.7 5.6"/><path d="M17 3v4h-4M7 21v-4h4"/></svg></div>
          <div class="tx"><b>予想→結果→検証→学び</b><span>投資を4ステップのループにする</span></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 13l9 5 9-5M3 8v5m18-5v5"/></svg></div>
          <div class="tx"><b>見立ての変遷を自動保存</b><span>書き換わる「買った理由」を全部残す</span></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 3v18M5 8h14M5 8l-2 5a3 3 0 0 0 6 0L7 8M19 8l-2 5a3 3 0 0 0 6 0l-2-5"/></svg></div>
          <div class="tx"><b>損益と、判断の質を分ける</b><span>偶然の勝ちを実力と勘違いしない</span></div>
        </div>
        <div class="row">
          <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 15V4m0 0-4 4m4-4 4 4"/><path d="M4 15v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/></svg></div>
          <div class="tx"><b>CSV取込・開示連携</b><span>楽天・SBIのCSVですぐ始められる</span></div>
        </div>
      </div>
      <div class="phone">
        <div class="notch"></div>
        <div class="screen"><img src="../../lp/recall.webp" alt=""></div>
      </div>
    </div>

    <div class="signrow">
      <div class="sign">なぜ、そう判断したか。<span class="q"></span></div>
    </div>
  </div>
  <img class="mascot" src="../../logumo-wave.svg" style="width:190px;right:56px;bottom:40px">
</div>
</body></html>
