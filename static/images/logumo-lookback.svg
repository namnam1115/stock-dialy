<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 320" width="260" height="320" role="img" aria-label="ログモ（振り返る）">
  <defs>
    <radialGradient id="lgl-body" cx="38%" cy="34%" r="72%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#fbfbfa"/>
      <stop offset="100%" stop-color="#e9e7e2"/>
    </radialGradient>
    <radialGradient id="lgl-arm" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6e4df"/>
    </radialGradient>
    <filter id="lgl-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="lgl-blur2" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <ellipse cx="132" cy="300" rx="72" ry="15" fill="#3b3c3d" opacity="0.14" filter="url(#lgl-soft)"/>

  <!-- trailing sparkle hearts on the right (looking back at the past) -->
  <path d="M236,120 c-4,-6 -13,-3 -13,4 c0,6 8,10 13,15 c5,-5 13,-9 13,-15 c0,-7 -9,-10 -13,-4 z" fill="#71c4ef" opacity="0.8"/>
  <path d="M242,176 c-3,-4 -9,-2 -9,3 c0,4 6,7 9,10 c3,-3 9,-6 9,-10 c0,-5 -6,-7 -9,-3 z" fill="#71c4ef" opacity="0.55"/>

  <!-- arms -->
  <path d="M46,214 C26,216 20,234 32,246 C42,254 56,246 56,230 Z" fill="url(#lgl-arm)" stroke="#e0ddd6" stroke-width="1"/>
  <path d="M214,214 C234,216 240,234 228,246 C218,254 204,246 204,230 Z" fill="url(#lgl-arm)" stroke="#e0ddd6" stroke-width="1"/>

  <path d="M130,26
           C86,26 48,62 42,118
           C37,160 37,208 48,244
           C56,266 76,278 102,280
           C112,281 150,281 160,280
           C186,278 206,266 214,244
           C225,208 225,160 220,118
           C214,62 176,26 130,26 Z"
        fill="url(#lgl-body)" stroke="#e4e1db" stroke-width="1.5"/>

  <ellipse cx="88" cy="98" rx="32" ry="24" fill="#ffffff" opacity="0.7" filter="url(#lgl-blur2)"/>

  <!-- face turned to the left, glancing back -->
  <g fill="#33322f">
    <ellipse cx="86" cy="152" rx="8" ry="11"/>
    <ellipse cx="130" cy="152" rx="8" ry="11"/>
  </g>
  <circle cx="83" cy="147" r="2.4" fill="#ffffff"/>
  <circle cx="127" cy="147" r="2.4" fill="#ffffff"/>
  <path d="M92,178 Q106,191 120,178" fill="none" stroke="#33322f" stroke-width="4" stroke-linecap="round"/>
</svg>
